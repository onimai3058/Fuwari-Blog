name: 构建并上传到“dist”分支

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检查源码
        uses: actions/checkout@v4

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: 安装依赖
        run: pnpm install

      - name: 构建
        run: pnpm build

      - name: 获取今日日期
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 上传到“dist”分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: dist
          commit_message: "build: site update ${{ env.DATE }}"
          force_orphan: true
